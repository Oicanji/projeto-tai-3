<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Automático</title>
    <script>
        window.onload = function() {
            var link = document.createElement('a');
            link.href = 'https://raw.githubusercontent.com/Oicanji/projeto-tai-3/main/anjo.png'; // URL do arquivo
            link.download = 'anjo.png'; // Nome do arquivo a ser baixado
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>
</head>
<body>
    <p>VOCÊ VAI BEM ATE PARA UM HUMANO</p>
</body>
</html>
